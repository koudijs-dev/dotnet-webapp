{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dotnet-webapp
  labels:
    app.kubernetes.io/name: dotnet-webapp
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dotnet-webapp
  endpoints:
    - port: http
      path: /metrics
      interval: "{{ .Values.serviceMonitor.interval }}"
      scrapeTimeout: "{{ .Values.serviceMonitor.scrapeTimeout }}"
{{- end }}
